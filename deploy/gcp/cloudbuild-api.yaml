# Build + deploy the XActions API server (api/server.js) to Cloud Run.
# Prereqs: run deploy/gcp/provision-api.sh once first — it creates the Cloud
# SQL instance, Secret Manager entries, and IAM bindings this config expects.
#
# Submit from the repo root:
#   gcloud builds submit --config deploy/gcp/cloudbuild-api.yaml --region us-central1 \
#     --project aerial-vehicle-466722-p5
serviceAccount: projects/aerial-vehicle-466722-p5/serviceAccounts/three-ws-build@aerial-vehicle-466722-p5.iam.gserviceaccount.com
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
steps:
  - id: pull-cache
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args: ['-c', 'docker pull $_IMAGE || exit 0']

  - id: build
    name: gcr.io/cloud-builders/docker
    env: ['DOCKER_BUILDKIT=1']
    args:
      - build
      - -t
      - $_IMAGE
      - --cache-from
      - $_IMAGE
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - -f
      - Dockerfile
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_IMAGE']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - xactions-api
      - --image=$_IMAGE
      - --project=$PROJECT_ID
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3001
      - --memory=2Gi
      - --cpu=2
      - --timeout=300
      - --min-instances=1
      - --max-instances=4
      - --service-account=three-ws@aerial-vehicle-466722-p5.iam.gserviceaccount.com
      # Cloud SQL Auth Proxy sidecar — reaches Postgres over a unix socket,
      # no VPC connector needed for this leg.
      - --add-cloudsql-instances=aerial-vehicle-466722-p5:us-central1:xactions-db
      # Reuse the three-ws Memorystore Redis instance (10.234.231.139:6379)
      # over the existing three-ws-vpc connector — see docs/ops/gcp-production.md
      # in the three.ws repo for the topology. Bull queue keys are namespaced
      # with prefix "xactions" (api/services/jobQueue.js) so they never collide
      # with three.ws's own keys on the same instance.
      - --vpc-connector=three-ws-vpc
      - --vpc-egress=private-ranges-only
      - --set-env-vars=NODE_ENV=production,PORT=3001,REDIS_HOST=10.234.231.139,REDIS_PORT=6379,REDIS_QUEUE_PREFIX=xactions,API_URL=https://api.xactions.app,API_BASE_URL=https://api.xactions.app,FRONTEND_URL=https://xactions.app,CORS_ORIGINS=https://xactions.app\,https://www.xactions.app\,https://xactions-e7r.pages.dev,PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true,PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium,PUPPETEER_HEADLESS=true,PUPPETEER_NO_SANDBOX=true
      - --set-secrets=DATABASE_URL=xactions-database-url:latest,JWT_SECRET=xactions-jwt-secret:latest,SESSION_SECRET=xactions-session-secret:latest,ADMIN_API_KEY=xactions-admin-api-key:latest

images:
  - $_IMAGE

substitutions:
  _IMAGE: us-central1-docker.pkg.dev/aerial-vehicle-466722-p5/containers/xactions-api:latest
